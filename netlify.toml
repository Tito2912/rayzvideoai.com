[build]
  command = "npm run build && (node scripts/ping-indexnow.cjs || true)"
  publish = "out"

[[redirects]]
  from = "http://www.rayzvideoai.com/*"
  to = "https://rayzvideoai.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://rayzvideoai.com/*"
  to = "https://rayzvideoai.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.rayzvideoai.com/*"
  to = "https://rayzvideoai.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
